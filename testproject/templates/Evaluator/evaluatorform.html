{% extends 'home.html' %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <h2 class="mb-4 text-center">Assign Evaluators to Candidate</h2>

    <form method="post" id="assign-evaluators-form">
        {% csrf_token %}
        <div class="mb-4">
            {{ candidate_form.candidate.label_tag }}
            {{ candidate_form.candidate }}
        </div>

        <div id="sections-container">
            <!-- Section forms will be loaded here via AJAX -->
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn" style="display:none;">Assign Evaluators</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const candidateSelect = document.getElementById('id_candidate');
    const sectionsContainer = document.getElementById('sections-container');
    const submitBtn = document.getElementById('submit-btn');

    candidateSelect.addEventListener('change', function () {
        const candidateId = this.value;
        sectionsContainer.innerHTML = '';
        submitBtn.style.display = 'none';

        if (!candidateId) return;

        fetch(`/ajax/get_sections/?candidate_id=${candidateId}`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    sectionsContainer.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                    return;
                }

                sectionsContainer.innerHTML = data.section_forms_html.join('');
                submitBtn.style.display = 'inline-block';
            })
            .catch(err => {
                sectionsContainer.innerHTML = `<div class="alert alert-danger">Error loading sections.</div>`;
                submitBtn.style.display = 'none';
                console.error(err);
            });
    });

    // Optionally handle form submission via AJAX or normal submit
});
</script>
{% endblock %}

{% extends 'home.html' %}

{% block content %}
<!-- Add in your base template if not already included -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <div class="text-center">
        <h2 class="mb-4" style="letter-spacing: 2px;">Candidate List Views</h2>
        
        <ol class="list-unstyled">
            {% for candidate in candidates %}
                <li id="candidate{{ candidate.id }}" class="my-3">
                    <div class="d-flex justify-content-center align-items-center mb-3">
                        <a href="{% url 'candidate-detail' pk=candidate.pk %}" 
                        class="text-decoration-none text-primary fw-bold fs-5 me-3">
                            {{ candidate.name }}
                        </a>

                       
                    </div>
                <hr class="w-50 mx-auto">
                </li>
            {% empty %}
                <li class="text-muted">No Candidates Registered yet.</li>
            {% endfor %}
        </ol>
    </div>
</div>
{% endblock %}
